# ============================================================
# postgresql.conf — PRIMARY SERVER
# Place at: /etc/postgresql/15/main/postgresql.conf
# or mount as Docker volume
# ============================================================

# ── CONNECTION ────────────────────────────────────────────────
listen_addresses = '*'
port = 5432
max_connections = 200

# ── WRITE-AHEAD LOG (WAL) — Core replication settings ────────
wal_level = replica               # Enables streaming replication
max_wal_senders = 5               # Max concurrent standby connections
max_replication_slots = 5         # Persistent replication slots
wal_keep_size = 1GB               # Keep 1GB of WAL for reconnecting standbys
wal_log_hints = on                # Required for pg_rewind

# WAL compression (reduces network bandwidth between regions)
wal_compression = on

hot_standby = on

# ── REPLICATION SETTINGS ─────────────────────────────────────
synchronous_commit = local        # Primary doesn't wait for standby ACK
                                  # Change to 'on' for zero data loss (slower)

# How long primary waits for standby before reverting to async
synchronous_standby_names = ''    # Empty = async replication (recommended
                                  # for cross-region to avoid latency impact)

# ── CHECKPOINTS ──────────────────────────────────────────────
checkpoint_completion_target = 0.9
checkpoint_timeout = 15min
max_wal_size = 4GB
min_wal_size = 1GB

# ── ARCHIVING — Daily backup to object storage ────────────────
# Uncomment and configure for point-in-time recovery (PITR)
archive_mode = on
archive_command = 'test ! -f /var/lib/postgresql/wal_archive/%f && cp %p /var/lib/postgresql/wal_archive/%f'
# For AWS S3: 'aws s3 cp %p s3://vaultlife-wal-archive/%f'
# For GCS:   'gsutil cp %p gs://vaultlife-wal-archive/%f'
archive_timeout = 3600            # Archive WAL every hour even if not full

# ── PERFORMANCE ───────────────────────────────────────────────
shared_buffers = 256MB            # 25% of RAM (adjust for your server)
effective_cache_size = 768MB
work_mem = 4MB
maintenance_work_mem = 64MB
random_page_cost = 1.1            # For SSD storage

# ── LOGGING ──────────────────────────────────────────────────
log_destination = 'stderr'
logging_collector = off
log_directory = 'log'
# log_filename = 'postgresql-%Y-%m-%d.log'
# log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 1000  # Log queries > 1 second
log_connections = on
log_disconnections = on
log_replication_commands = on      # Log all replication activity

# ── SECURITY ──────────────────────────────────────────────────
ssl = off
# ssl_cert_file = '/etc/ssl/certs/server.crt'
# ssl_key_file  = '/etc/ssl/private/server.key'
