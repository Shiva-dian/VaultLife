# ============================================================
# pg_hba.conf — PRIMARY SERVER
# Controls who can connect and with what auth method
# Place at: /etc/postgresql/15/main/pg_hba.conf
# ============================================================

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# ── LOCAL connections (Docker / same machine) ─────────────────
local   all             all                                     trust
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256

# ── Application connections ───────────────────────────────────
# Allow VaultLife backend to connect to the primary DB
# Replace 10.0.0.0/8 with your actual app server subnet
host    vaultlife_db    vaultlife_user  10.0.0.0/8              scram-sha-256

# ── REPLICATION connections ───────────────────────────────────
# This is the critical entry — allows the standby server to
# connect using the replication user
#
# Replace 2402:3a80:1906:52e3:648c:2562:ffe1:5c7e with your actual standby server IP
# e.g. for AWS: your standby EC2 private/public IP
host    replication     replicator      2402:3a80:1906:52e3:648c:2562:ffe1:5c7e/128    scram-sha-256

# For Docker Compose internal network (development):
host    replication     replicator      172.16.0.0/12           scram-sha-256

# ── pgAdmin / Admin connections ───────────────────────────────
# Only allow from trusted admin IPs
# host  all             postgres        ADMIN_IP/32             scram-sha-256

# Allow Docker containers to connect
host    all             all             172.16.0.0/12           scram-sha-256

# Optional: allow all IPv4
host    all             all             0.0.0.0/0               scram-sha-256