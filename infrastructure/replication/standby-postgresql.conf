# ============================================================
# postgresql.conf — STANDBY SERVER
# Place at: /etc/postgresql/15/main/postgresql.conf
# Region 2 — opposite timezone to primary (~12h apart)
# ============================================================

# ── CONNECTION ────────────────────────────────────────────────
listen_addresses = '*'
port = 5432
max_connections = 200

# ── STANDBY / RECOVERY SETTINGS ──────────────────────────────
# This file is read only on standby — primary ignores standby-only params

# Hot standby: allows read-only queries on standby
hot_standby = on
hot_standby_feedback = on          # Tells primary about standby's oldest transaction
                                    # Prevents vacuum from removing rows standby still needs

# How long standby waits for primary WAL before raising error
wal_receiver_timeout = 60s
wal_receiver_status_interval = 10s # Report status to primary every 10s

# ── WAL ───────────────────────────────────────────────────────
wal_level = replica                 # Needed if this standby will have its own standbys
max_wal_senders = 5
wal_keep_size = 1GB
wal_compression = on

# ── RECOVERY TARGET ───────────────────────────────────────────
# recovery_target_timeline = 'latest'  # Always follow latest timeline (auto-set in signal file)

# ── ARCHIVING ────────────────────────────────────────────────
archive_mode = off              # 'always' archives even on standby (for cascading)
archive_command = 'test ! -f /var/lib/postgresql/wal_archive/%f && cp %p /var/lib/postgresql/wal_archive/%f'

# ── PERFORMANCE ───────────────────────────────────────────────
shared_buffers = 256MB
effective_cache_size = 768MB
work_mem = 4MB
maintenance_work_mem = 64MB

# Standby can do more aggressive prefetching since it's read-only
max_parallel_workers_per_gather = 2

# ── LOGGING ──────────────────────────────────────────────────
log_destination = 'stderr'
logging_collector = off
log_directory = 'log'
# log_filename = 'standby-%Y-%m-%d.log'
# log_rotation_age = 1d
log_min_duration_statement = 1000
log_connections = on
log_replication_commands = on

# ── SECURITY ──────────────────────────────────────────────────
ssl = off
# ssl_cert_file = '/etc/ssl/certs/server.crt'
# ssl_key_file  = '/etc/ssl/private/server.key'

include_if_exists = '/var/lib/postgresql/data/postgresql.auto.conf'
